name: OpenAPI Spec Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  openapi-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Run OpenAPI CI check
        env:
          MONGODBURI: dummy-mongodb-uri
          JWT_SECRET: dummy-secret
        run: npm run openapi:ci
